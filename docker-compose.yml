version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: remnawave-billing-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: remnawave_billing
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - remnawave-shared   # ← добавил

  api:
    build: .
    container_name: remnawave-billing-api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./app:/app/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - remnawave-shared  
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:

networks:
  remnawave-shared:
    external: true
    name: remnawave-shared
